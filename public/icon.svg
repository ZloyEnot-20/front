<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #7c3aed; }
      .fg { fill: white; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #6d28d9; }
      .fg { fill: white; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="36"/>
  <g class="fg" transform="translate(36, 36)">
    <!-- Calendar / event icon: card with binding and event dot -->
    <rect x="12" y="8" width="84" height="72" rx="8" stroke="currentColor" stroke-width="6" fill="none"/>
    <line x1="12" y1="32" x2="96" y2="32" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
    <circle cx="54" cy="62" r="12" fill="currentColor"/>
  </g>
</svg>
